# ============================================
# قالب استراتيجية: XAUUSD Smart Money Concepts
# ============================================
name: "XAUUSD_SMC_MTF"
symbol: "XAUUSD"
description: >
  استراتيجية تعتمد على التوافق بين عدة فريمات زمنية (Multi-Timeframe Confluence)
  لاكتشاف Order Blocks وFair Value Gaps حول نقاط BOS/CHoCH.

timeframes:
  trend_filter: ["4h", "1h"]      # تحدد الاتجاه العام (لا يُتداول عكسها)
  setup: ["15m", "5m"]            # فريم تكوّن الإشارة (OB/FVG)
  entry: ["1m"]                   # فريم الدخول الدقيق (تأكيد سعري)

entry_rules:
  required_structures: ["BOS", "CHoCH", "OB", "SND", "SNR", "REVERSAL_PINBAR", "REVERSAL_ENGULFING"]
  min_confidence: 0.55
  require_fvg_confluence: true     # يفضّل أن يكون هناك FVG قريب من منطقة OB
  max_distance_pips_to_ob: 50      # أقصى مسافة سعرية مقبولة لاعتبار OB صالحاً للدخول

risk_management:
  reward_risk_ratio: 2.5            # احتياطي (يُستخدم فقط لو sl_usd/tp_usd غير محددين)
  sl_buffer: 0.5
  sl_usd: 5.0                       # وقف خسارة ثابت 5$ (~ 40-60 بيب حسب تعريف الوسيط)
  tp_usd: 15.0                      # هدف ربح ثابت 15$ (~ 100-200 بيب حسب تعريف الوسيط)
  risk_per_trade_pct: 1.0
  max_daily_trades: 4               # مضاربة يومية: 1-4 صفقات كحد أقصى يومياً
  max_daily_loss_pct: 3.0

sessions:
  # أوقات تداول مفضلة بتوقيت UTC (تتزامن غالباً مع تقلبات الذهب الأعلى)
  london_open: "07:00-10:00"
  ny_open: "12:30-15:30"
  avoid_low_liquidity: true

notifications:
  telegram: true
  notify_on: ["BOS", "CHoCH", "OB", "SND", "SNR"]   # لا إشعار لكل FVG لتجنب الإسبام
  daily_summary: true

llm:
  enabled: true
  min_structures_for_llm_call: 1
  language: "ar"

news_filter:
  enabled: true
  buffer_minutes_before: 30     # إيقاف الدخول 30 دقيقة قبل خبر عالي التأثير
  buffer_minutes_after: 30      # إيقاف الدخول 30 دقيقة بعد خبر عالي التأثير

ml_filter:
  enabled: true
  min_label: "medium"           # strong / medium / weak — الحد الأدنى المقبول للتنفيذ
  min_trades_for_training: 50

rl_agent:
  enabled: false                # تشغيل يدوي حالياً عبر app/rl_agent.py (تحسين دوري للمعاملات)
  epsilon: 0.2
